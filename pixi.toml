[workspace]
name = "drone"
description = "Distributed Reactive Orchestration Nodes Environment"
channels = ["conda-forge"]
platforms = ["osx-arm64", "osx-64", "linux-64"]

[dependencies]
python = ">=3.13"

[pypi-dependencies]
drones = { path = ".", editable = true }

[feature.dev.pypi-dependencies]
pytest = ">=8.0"
pytest-timeout = ">=2.0"
ruff = ">=0.6"
mypy = ">=1.10"

[environments]
default = { features = ["dev"], solve-group = "default" }

[tasks]
test = "pytest tests/ -v"
lint = "ruff check ."
format = "ruff format ."
typecheck = "mypy"
publisher = "python examples/publisher.py"
subscriber = "python examples/subscriber.py"
